name: Production Yard Monitor Cron

on:
  schedule:
    # Runs every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  ping-monitor-api:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Vercel Cron API
        run: |
          curl -X GET "${{ secrets.PROD_URL }}/api/cron/monitor" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
